---
extends: default

rules:
  line-length: disable
  document-start: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  truthy:
    check-keys: false
  indentation:
    spaces: consistent
    indent-sequences: consistent
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  # Allow tabular alignment in inline-flow YAML (used in seaweedfs ports list)
  commas:
    max-spaces-after: -1
  colons:
    max-spaces-after: -1

ignore: |
  node_modules/
  docs/.vitepress/cache/
  docs/.vitepress/dist/
  k3dvol/
  # Vendored upstream Calico install bundle — not our code to format
  manifests/calico.yaml
  # Shell-templated (contains $(...) command substitution); not valid YAML
  k3d-cluster-template.yaml
  # Upstream Kuma helm values structure mixes indent-sequences styles
  examples/kuma-mesh/standalone-cp-values.yaml
