---
extends: default

rules:
  line-length: disable
  document-start: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  truthy:
    check-keys: false
  indentation:
    spaces: 2
    indent-sequences: false
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1

ignore: |
  node_modules/
  docs/.vitepress/cache/
  docs/.vitepress/dist/
  k3dvol/
  # Vendored upstream Calico install bundle — not our code to format
  manifests/calico.yaml
  # Shell-templated (contains $(...) command substitution); not valid YAML
  k3d-cluster-template.yaml
