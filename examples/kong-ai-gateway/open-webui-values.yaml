podAnnotations:
  # Port 443: Kong Gateway Proxy is a Kuma gateway dataplane, not a mesh backend.
  #           Other sidecars can't route to it via mTLS — exclude for direct access.
  # Port 6379: Redis uses binary protocol, not HTTP.
  traffic.kuma.io/exclude-outbound-ports: "443,6379"

serviceAccount:
  automountServiceAccountToken: true

websocket:
  redis:
    pods:
      annotations:
        traffic.kuma.io/exclude-inbound-ports: "6379"
        # Port 443: Kong Gateway Proxy is a Kuma gateway dataplane, not a mesh backend.
  #           Other sidecars can't route to it via mTLS — exclude for direct access.
  # Port 6379: Redis uses binary protocol, not HTTP.
  traffic.kuma.io/exclude-outbound-ports: "443,6379"

ollama:
  enabled: false

pipelines:
  enabled: false

extraEnvVars:
  - name: ENABLE_OLLAMA_API
    value: "false"
  - name: OPENAI_API_BASE_URLS
    value: "https://kong-gateway-proxy.kong.svc.cluster.local:443/ollama/v1"
  - name: OPENAI_API_KEYS
    value: "admin-key-12345"
  - name: WEBUI_AUTH
    value: "false"
  # RAG Configuration
  - name: RAG_EMBEDDING_ENGINE
    value: "ollama"
  - name: RAG_EMBEDDING_MODEL
    value: "nomic-embed-text"
  - name: RAG_OLLAMA_BASE_URL
    value: "http://ollama.ai-platform.svc.cluster.local:11434"
  - name: RAG_TOP_K
    value: "5"
  - name: CONTENT_EXTRACTION_ENGINE
    value: "default"
  - name: AIOHTTP_CLIENT_TIMEOUT
    value: "300"
