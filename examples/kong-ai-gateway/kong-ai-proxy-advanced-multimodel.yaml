apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-proxy-advanced-multimodel
  namespace: kong
plugin: ai-proxy-advanced
config:
  balancer:
    algorithm: round-robin
    connect_timeout: 10000
    read_timeout: 300000
    write_timeout: 300000
  # NOTE: model_alias is Enterprise-schema, which KIC only accepts after the
  # license is active. setup.sh applies this file twice: first pass strips the
  # model_alias lines (so a fresh, pre-license install doesn't fail with
  # `unknown field model_alias`), second pass re-applies it verbatim once the
  # license is loaded. This file stays the single source of truth for the
  # targets (logging.log_statistics + input/output_cost included).
  targets:
    - route_type: llm/v1/chat
      logging:
        log_statistics: true
        log_payloads: false
      model:
        provider: openai
        name: llama3.2:1b
        model_alias: llama3.2:1b
        options:
          upstream_url: "http://ollama.ai-platform.svc.cluster.local:11434/v1/chat/completions"
          input_cost: 500
          output_cost: 1500
    - route_type: llm/v1/chat
      logging:
        log_statistics: true
        log_payloads: false
      model:
        provider: openai
        name: qwen2.5-coder:1.5b
        model_alias: qwen2.5-coder:1.5b
        options:
          upstream_url: "http://ollama.ai-platform.svc.cluster.local:11434/v1/chat/completions"
          input_cost: 500
          output_cost: 1500
    - route_type: llm/v1/chat
      logging:
        log_statistics: true
        log_payloads: false
      model:
        provider: openai
        name: gemma3:1b
        model_alias: gemma3:1b
        options:
          upstream_url: "http://ollama.ai-platform.svc.cluster.local:11434/v1/chat/completions"
          input_cost: 500
          output_cost: 1500
    - route_type: llm/v1/chat
      logging:
        log_statistics: true
        log_payloads: false
      auth:
        param_name: key
        param_value: "{vault://my-env/GEMINI_API_KEY}"
        param_location: query
      model:
        provider: gemini
        name: gemini-2.5-flash
        model_alias: gemini-2.5-flash
        options:
          input_cost: 150
          output_cost: 600
