apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-proxy-gemma-internal
  namespace: kong
  annotations:
    konghq.com/plugins: ai-proxy-gemma,ai-key-auth
    konghq.com/strip-path: "true"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /gemma
      backendRefs:
        - name: ollama
          namespace: ai-platform
          port: 11434
