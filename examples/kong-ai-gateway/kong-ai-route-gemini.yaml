apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-proxy-gemini
  namespace: kong
  annotations:
    konghq.com/plugins: ai-proxy-gemini,ai-key-auth-or-oidc,ai-oidc,acl-gemini,ai-force-nostream,ai-semantic-cache,ai-http-log
    konghq.com/strip-path: "true"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - "ai.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /gemini
      backendRefs:
        - name: kong-gateway-admin
          port: 8001
