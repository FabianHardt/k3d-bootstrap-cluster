apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-proxy-ollama
  namespace: kong
  annotations:
    konghq.com/plugins: ai-proxy-ollama,ai-key-auth,ai-http-log
    konghq.com/strip-path: "true"
    konghq.com/read-timeout: "300000"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - "ai.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ollama
      backendRefs:
        - name: ollama
          namespace: ai-platform
          port: 11434
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: kong-to-ai-platform
  namespace: ai-platform
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kong
  to:
    - group: ""
      kind: Service
