apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-proxy-ollama
  namespace: kong
  annotations:
    konghq.com/plugins: ai-proxy-advanced-multimodel,ai-key-auth-or-oidc,ai-oidc,ai-semantic-cache
    konghq.com/strip-path: "true"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - "ai.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ollama
      timeouts:
        backendRequest: "300s"
      backendRefs:
        - name: kong-gateway-admin
          port: 8001
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: kong-to-ai-platform
  namespace: ai-platform
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kong
  to:
    - group: ""
      kind: Service
