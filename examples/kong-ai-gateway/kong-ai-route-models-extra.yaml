apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-models-response-coder
  namespace: kong
plugin: request-termination
config:
  status_code: 200
  content_type: "application/json"
  body: '{"object":"list","data":[{"id":"qwen2.5-coder:1.5b","object":"model","created":1700000000,"owned_by":"library"}]}'
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-models-response-gemma
  namespace: kong
plugin: request-termination
config:
  status_code: 200
  content_type: "application/json"
  body: '{"object":"list","data":[{"id":"gemma3:1b","object":"model","created":1700000000,"owned_by":"library"}]}'
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-models-coder
  namespace: kong
  annotations:
    konghq.com/plugins: ai-key-auth,ai-models-response-coder
spec:
  parentRefs:
    - name: kong
      namespace: kong
  rules:
    - matches:
        - path:
            type: Exact
            value: /coder/v1/models
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/models
      backendRefs:
        - name: ollama
          namespace: ai-platform
          port: 11434
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-models-gemma
