apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-http-log
  namespace: kong
plugin: http-log
config:
  http_endpoint: "http://ai-metrics-exporter.monitoring.svc.cluster.local:9090/log"
  content_type: "application/json"
  flush_timeout: 2
  retry_count: 3
  custom_fields_by_lua:
    ai_response: "return kong.service.response.get_raw_body() or ''"
