# ai-force-nostream: Forces stream:false in request body so Kong receives
# complete responses for token metrics and correct Content-Length.
# Requires KONG_UNTRUSTED_LUA=on in Kong gateway config.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-force-nostream
  namespace: kong
plugin: pre-function
config:
  access:
    - |
      local body = kong.request.get_raw_body()
      if body and #body > 0 then
        local cjson = require("cjson.safe")
        local json = cjson.decode(body)
        if json then
          json.stream = false
          kong.service.request.set_raw_body(cjson.encode(json))
        end
      end
