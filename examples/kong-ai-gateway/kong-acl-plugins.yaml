apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: acl-gemini
  namespace: kong
plugin: acl
config:
  # Match membership in the Kong Consumer Group of the same name.
  include_consumer_groups: true
  allow:
    - gemini-access
  hide_groups_header: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: acl-anthropic
  namespace: kong
plugin: acl
config:
  include_consumer_groups: true
  allow:
    - anthropic-access
  hide_groups_header: true
