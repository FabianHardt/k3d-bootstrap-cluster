apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-models-ollama
  namespace: kong
  annotations:
    konghq.com/plugins: ai-key-auth,ai-models-response
spec:
  parentRefs:
    - name: kong
      namespace: kong
  rules:
    - matches:
        - path:
            type: Exact
            value: /ollama/v1/models
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/models
      backendRefs:
        - name: ollama
          namespace: ai-platform
          port: 11434
