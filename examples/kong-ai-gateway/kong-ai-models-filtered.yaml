# /v1/models list, filtered by the consumer's Kong Consumer Group membership.
# Single source of truth = the same Consumer Groups the acl plugin enforces on
# the provider routes (kong-consumers.yaml). No hardcoded email/role maps.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-models-filtered
  namespace: kong
plugin: post-function
config:
  access:
    - |
      local cjson = require("cjson")

      -- Base tier: always available (local Ollama models).
      local base = {
        {id = "llama3.2:1b",        object = "model", created = 1700000000, owned_by = "ollama"},
        {id = "qwen2.5-coder:1.5b", object = "model", created = 1700000000, owned_by = "ollama"},
        {id = "gemma3:1b",          object = "model", created = 1700000000, owned_by = "ollama"},
      }
      -- Extra models unlocked by Consumer Group membership (ordered).
      local tiers = {
        {group = "gemini-access",    models = {{id = "gemini-2.5-flash", object = "model", created = 1700000000, owned_by = "google"}}},
        {group = "anthropic-access", models = {{id = "claude-haiku-4-5", object = "model", created = 1700000000, owned_by = "anthropic"}}},
      }

      local member = {}
      for _, g in ipairs(kong.client.get_consumer_groups() or {}) do
        member[g.name] = true
      end

      local models = {}
      for _, m in ipairs(base) do models[#models + 1] = m end
      for _, tier in ipairs(tiers) do
        if member[tier.group] then
          for _, m in ipairs(tier.models) do models[#models + 1] = m end
        end
      end

      return kong.response.exit(200, cjson.encode({object = "list", data = models}), {
        ["Content-Type"] = "application/json"
      })
