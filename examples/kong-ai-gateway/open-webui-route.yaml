apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: open-webui
  namespace: ai-platform
  annotations:
    konghq.com/strip-path: "false"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - "chat.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        backendRequest: "300s"
      backendRefs:
        - name: open-webui
          port: 80
