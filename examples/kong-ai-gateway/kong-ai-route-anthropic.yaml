apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-proxy-anthropic
  namespace: kong
  annotations:
    konghq.com/plugins: ai-proxy-anthropic,ai-key-auth,acl-anthropic
    konghq.com/strip-path: "true"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - "ai.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anthropic
      backendRefs:
        - name: kong-gateway-admin
          port: 8001
