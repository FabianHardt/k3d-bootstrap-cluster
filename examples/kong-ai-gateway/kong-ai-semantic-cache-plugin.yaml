# AI Semantic Cache — caches LLM responses by semantic similarity (Enterprise)
# Uses Ollama nomic-embed-text for embeddings, Redis Stack for vector search
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-semantic-cache
  namespace: kong
plugin: ai-semantic-cache
config:
  embeddings:
    model:
      provider: ollama
      name: nomic-embed-text
      options:
        upstream_url: "http://ollama.ai-platform.svc.cluster.local:11434"
  vectordb:
    strategy: redis
    threshold: 0.85
    distance_metric: cosine
    dimensions: 768
    redis:
      host: "redis-semantic-cache.ai-platform.svc.cluster.local"
      port: 6379
  cache_ttl: 3600
