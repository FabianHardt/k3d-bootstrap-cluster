# Anonymous consumer — fallback when neither key-auth nor OIDC succeeds
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: anonymous-consumer
  namespace: kong
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: ai-block-anonymous
username: anonymous
---
# Block unauthenticated requests (applied to anonymous consumer only)
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-block-anonymous
  namespace: kong
plugin: request-termination
config:
  status_code: 401
  content_type: "application/json"
  body: '{"message":"Unauthorized — provide an API key or OIDC token"}'
---
# OIDC plugin for JWT validation and consumer mapping
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ai-oidc
  namespace: kong
plugin: openid-connect
config:
  issuer: "http://keycloak.ai-platform.svc.cluster.local:8080/realms/ai-platform"
  auth_methods:
    - bearer
  bearer_token_param_type:
    - header
  consumer_by:
    - custom_id
  consumer_claim:
    - preferred_username
  consumer_optional: true
  anonymous: anonymous
  extra_jwks_uris:
    - "http://keycloak.ai-platform.svc.cluster.local:8080/realms/ai-platform/protocol/openid-connect/certs"
  verify_signature: true
  cache_ttl: 300
