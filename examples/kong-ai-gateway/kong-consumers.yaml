# --- API Keys ---
apiVersion: v1
kind: Secret
metadata:
  name: dev-user-key
  namespace: kong
  labels:
    konghq.com/credential: key-auth
type: Opaque
stringData:
  key: "dev-key-12345"
---
apiVersion: v1
kind: Secret
metadata:
  name: dev-user-key-bearer
  namespace: kong
  labels:
    konghq.com/credential: key-auth
type: Opaque
stringData:
  key: "Bearer dev-key-12345"
---
apiVersion: v1
kind: Secret
metadata:
  name: lead-user-key
  namespace: kong
  labels:
    konghq.com/credential: key-auth
type: Opaque
stringData:
  key: "lead-key-12345"
---
apiVersion: v1
kind: Secret
metadata:
  name: lead-user-key-bearer
  namespace: kong
  labels:
    konghq.com/credential: key-auth
type: Opaque
stringData:
  key: "Bearer lead-key-12345"
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-user-key
  namespace: kong
  labels:
    konghq.com/credential: key-auth
type: Opaque
stringData:
  key: "admin-key-12345"
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-user-key-bearer
  namespace: kong
  labels:
    konghq.com/credential: key-auth
type: Opaque
stringData:
  key: "Bearer admin-key-12345"
---
# --- Consumer Groups = access tiers (single source of truth) ---
# Membership drives BOTH route access (acl plugin with include_consumer_groups)
# AND the /v1/models list (kong.client.get_consumer_groups()).
apiVersion: configuration.konghq.com/v1beta1
kind: KongConsumerGroup
metadata:
  name: gemini-access
  namespace: kong
  annotations:
    kubernetes.io/ingress.class: kong
---
apiVersion: configuration.konghq.com/v1beta1
kind: KongConsumerGroup
metadata:
  name: anthropic-access
  namespace: kong
  annotations:
    kubernetes.io/ingress.class: kong
---
# --- Consumers ---
# dev-user: base tier (Ollama only) — no groups
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: dev-user
  namespace: kong
  annotations:
    kubernetes.io/ingress.class: kong
username: dev-user
custom_id: dev
credentials:
  - dev-user-key
  - dev-user-key-bearer
---
# team-lead: + Gemini
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: team-lead
  namespace: kong
  annotations:
    kubernetes.io/ingress.class: kong
username: team-lead
custom_id: lead
credentials:
  - lead-user-key
  - lead-user-key-bearer
consumerGroups:
  - gemini-access
---
# admin-user: + Gemini + Anthropic
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: admin-user
  namespace: kong
  annotations:
    kubernetes.io/ingress.class: kong
username: admin-user
custom_id: admin
credentials:
  - admin-user-key
  - admin-user-key-bearer
consumerGroups:
  - gemini-access
  - anthropic-access
