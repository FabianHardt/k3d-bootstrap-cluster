apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-proxy-failover
  namespace: kong
  annotations:
    konghq.com/plugins: ai-proxy-advanced-failover,ai-key-auth-or-oidc,ai-oidc,ai-semantic-cache
    konghq.com/strip-path: "true"
spec:
  parentRefs:
    - name: kong
      namespace: kong
  hostnames:
    - "ai.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ai
      backendRefs:
        - name: kong-gateway-admin
          port: 8001
