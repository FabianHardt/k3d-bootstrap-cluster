apiVersion: v1
kind: Namespace
metadata:
  name: demo-velero
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-data
  namespace: demo-velero
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: demo-velero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
      annotations:
        # Opt-in for Velero file-system backup of this pod's volumes.
        backup.velero.io/backup-volumes: data
    spec:
      initContainers:
        # Seed a placeholder index.html so the page renders right after setup,
        # before demo.sh has written its timestamped content. Idempotent — the
        # file is only created if it does not already exist (so a restored
        # index.html from Velero is left untouched).
        - name: seed-index
          image: nginx:1.27-alpine
          command:
            - sh
            - -c
            - |
              if [ ! -f /usr/share/nginx/html/index.html ]; then
                echo "<h1>nginx-velero — fresh PVC, run demo.sh to write data</h1>" \
                  > /usr/share/nginx/html/index.html
              fi
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nginx-data
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: demo-velero
spec:
  selector:
    app: nginx
  ports:
    - { port: 80, targetPort: 80 }
