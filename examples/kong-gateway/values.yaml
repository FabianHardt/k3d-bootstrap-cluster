controller:
  ingressController:
    env:
      log_level: debug
      feature_gates: "GatewayAlpha=true"
    adminApi:
      tls:
        client:
          enabled: true
      repository: kong/kubernetes-ingress-controller
      tag: 3.5.6

gateway:
  env:
    log_level: debug
    admin_gui_url: https://kong-manager.example.com:8081
    admin_api_uri: https://kong-admin.example.com:8081
    # Prefer A records (ClusterIP) over SRV records (Pod IPs).
    # Required for Kuma mTLS: outbound listeners match on ClusterIP:port.
    dns_order: A,CNAME
    # Allow pre-function/post-function plugins to use require('cjson') etc.
    untrusted_lua: "on"
    # Enable tracing instrumentation for OpenTelemetry plugin (default: off)
    tracing_instrumentations: all


  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 2
  image:
    repository: kong/kong-gateway
    tag: 3.14.0.1
  serviceMonitor:
    enabled: true
    labels:
      release: promstack

  proxy:
    type: LoadBalancer
    stream:
      - containerPort: 9443
        servicePort: 9443
        protocol: TCP
        parameters:
          - ssl

  manager:
    enabled: true
    type: ClusterIP
    http:
      enabled: true

  admin:
    enabled: true
    type: ClusterIP
    http:
      enabled: true
