# Composition (HAProxy-Variante) — die Implementierung hinter dem API.
#
# Das Platform-Team schreibt diese Datei. Entwickler sehen sie nicht direkt.
# Sie beschreibt, was beim Anlegen eines AppEnvironment-Claims passiert:
#
#   1. Namespace     → app-{appName}
#   2. Deployment    → httpbin (oder benutzerdefiniertes Image) im Namespace
#   3. Service       → ClusterIP, Port 80
#   4. Ingress       → {appName}.127-0-0-1.nip.io über HAProxy
#
# Jede Ressource ist ein "Object" des Kubernetes-Providers. Crossplane überwacht
# diese Objects und stellt sicher, dass der gewünschte Zustand immer erhalten bleibt.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: appenvironment-haproxy
  labels:
    ingress: haproxy
spec:
  compositeTypeRef:
    apiVersion: platform.example.com/v1alpha1
    kind: XAppEnvironment
  resources:

    # -------------------------------------------------------------------------
    # Ressource 1: Namespace
    # Jede App bekommt einen eigenen, isolierten Namespace.
    # -------------------------------------------------------------------------
    - name: namespace
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: in-cluster
          forProvider:
            manifest:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: app-placeholder
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.metadata.name"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "app-%s"

    # -------------------------------------------------------------------------
    # Ressource 2: Deployment
    # Startet das Container-Image mit der gewünschten Anzahl Replicas.
    # -------------------------------------------------------------------------
    - name: deployment
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: in-cluster
          forProvider:
            manifest:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: app-placeholder
                namespace: app-placeholder
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: app-placeholder
                template:
                  metadata:
                    labels:
                      app: app-placeholder
                  spec:
                    containers:
                      - name: app
                        image: kennethreitz/httpbin
                        ports:
                          - containerPort: 80
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.metadata.namespace"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "app-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.metadata.name"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "app-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.spec.selector.matchLabels.app"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.spec.template.metadata.labels.app"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.image"
          toFieldPath: "spec.forProvider.manifest.spec.template.spec.containers[0].image"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.replicas"
          toFieldPath: "spec.forProvider.manifest.spec.replicas"

    # -------------------------------------------------------------------------
    # Ressource 3: Service
    # Macht das Deployment innerhalb des Clusters erreichbar (ClusterIP).
    # -------------------------------------------------------------------------
    - name: service
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: in-cluster
          forProvider:
            manifest:
              apiVersion: v1
              kind: Service
              metadata:
                name: app-placeholder
                namespace: app-placeholder
              spec:
                type: ClusterIP
                selector:
                  app: app-placeholder
                ports:
                  - port: 80
                    targetPort: 80
                    protocol: TCP
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.metadata.namespace"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "app-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.metadata.name"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "app-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.spec.selector.app"

    # -------------------------------------------------------------------------
    # Ressource 4: Ingress (HAProxy)
    # Exponiert die App nach außen unter {appName}.127-0-0-1.nip.io
    # -------------------------------------------------------------------------
    - name: ingress
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: in-cluster
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: app-placeholder
                namespace: app-placeholder
                annotations:
                  ingress.kubernetes.io/ssl-redirect: "false"
              spec:
                ingressClassName: haproxy
                rules:
                  - host: placeholder.127-0-0-1.nip.io
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: app-placeholder
                              port:
                                number: 80
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.metadata.namespace"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "app-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.metadata.name"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "app-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.spec.rules[0].host"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "%s.127-0-0-1.nip.io"
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.appName"
          toFieldPath: "spec.forProvider.manifest.spec.rules[0].http.paths[0].backend.service.name"
          transforms:
            - type: string
              string:
                type: Format
                fmt: "app-%s"
