apiVersion: v1
kind: Namespace
metadata:
  name: seaweedfs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-s3-config
  namespace: seaweedfs
data:
  # SeaweedFS S3 identities — Lab credentials only.
  # See: https://github.com/seaweedfs/seaweedfs/wiki/Amazon-S3-API#static-configuration
  s3.json: |
    {
      "identities": [
        {
          "name": "admin",
          "credentials": [
            { "accessKey": "seaweedadmin", "secretKey": "seaweedadminsecret" }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-data
  namespace: seaweedfs
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs
  namespace: seaweedfs
spec:
  serviceName: seaweedfs
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: weed
          image: chrislusf/seaweedfs:3.80
          args:
            - server
            - -dir=/data
            - -master.volumeSizeLimitMB=1024
            - -volume.max=0
            - -filer
            - -s3
            - -s3.config=/etc/seaweedfs/s3.json
          ports:
            - { name: master,  containerPort: 9333 }
            - { name: volume,  containerPort: 8080 }
            - { name: filer,   containerPort: 8888 }
            - { name: s3,      containerPort: 8333 }
          readinessProbe:
            httpGet:
              path: /status
              port: 8333
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - { name: data,   mountPath: /data }
            - { name: config, mountPath: /etc/seaweedfs }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-data
        - name: config
          configMap:
            name: seaweedfs-s3-config
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: seaweedfs
spec:
  selector:
    app: seaweedfs
  ports:
    - { name: master, port: 9333, targetPort: 9333 }
    - { name: filer,  port: 8888, targetPort: 8888 }
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-s3
  namespace: seaweedfs
spec:
  selector:
    app: seaweedfs
  ports:
    - { name: s3, port: 8333, targetPort: 8333 }
