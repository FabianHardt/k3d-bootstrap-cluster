# tags instead of digests, so the images preloaded via 'k3d image import'
# in deployCilium() are actually used by the kubelet
image:
  useDigest: false
operator:
  replicas: 1
  image:
    useDigest: false
ipam:
  mode: kubernetes
# embedded Envoy in the agent: one image less to preload
envoy:
  enabled: false
# bpffs/cgroup2 are pre-mounted by manifests/k3d-entrypoint-cilium.sh;
# Cilium's auto-mount init container cannot run in the bash-less k3s image
cgroup:
  autoMount:
    enabled: false
  hostRoot: /run/cilium/cgroupv2
# Let other CNI plugins chain onto Cilium's conflist. The Kuma service-mesh
# CNI (kuma-mesh / kong-ai-gateway showcases) appends a kuma-cni plugin to
# /etc/cni/net.d/05-cilium.conflist. With the default cni.exclusive=true
# Cilium keeps rewriting that file and strips the chained entry, so
# kuma-cni-node crash-loops, the NodeReadiness taint is never cleared and the
# Kuma transparent proxy is never installed (meshed pods then fail their
# kuma-validation init container).
cni:
  exclusive: false
