# Image tags are injected at install time from ../kong-versions.env via helm
# --set (gateway.image.tag, controller.ingressController.image.tag). Do not pin
# versions here — bump them in kong-versions.env.
gateway:
  image:
    repository: kong/kong-gateway
  proxy:
    type: LoadBalancer
  manager:
    enabled: false
  admin:
    enabled: true
    type: ClusterIP
    http:
      enabled: true
